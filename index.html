<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chuck Norris Facts - Recherche</title>
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h1>Chuck Norris Facts</h1>
        <span class="header-tribute">1940 — 2026</span>
    </div>

    <!-- Random fact -->
    <div class="random-section" id="random-section" style="display:none;">
        <div class="random-card">
            <p class="random-text" id="random-text"></p>
            <div class="random-footer">
                <span class="random-meta" id="random-meta"></span>
                <div class="random-actions">
                    <button class="random-nav" id="random-prev" title="Précédent">&#9664;</button>
                    <button class="random-nav" id="random-next" title="Suivant">&#9654;</button>
                    <button class="random-copy" id="random-copy">Copier</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="search-box">
            <input type="text" class="search-input" id="search" placeholder="Rechercher un fact..." autofocus>
            <div class="stats" id="stats"></div>
        </div>

        <div class="results" id="results">
            <div class="loading" id="loading">Chargement des facts...</div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
